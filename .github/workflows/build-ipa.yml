name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          ls /Applications | grep Xcode
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          LATEST="${LATEST:-/Applications/Xcode.app}"
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .app
        run: |
          xcodebuild \
            -project RepForge.xcodeproj \
            -scheme RepForge \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            build

      - name: Package IPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/RepForge.app"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r RepForge.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: RepForge-unsigned-ipa
          path: RepForge.ipa
          retention-days: 14
